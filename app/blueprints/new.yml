xulcan_version: "2.0"

id: "research-orchestrator-v1"
name: "Research Orchestrator"
version: "2.1.0"

model: "google/gemini-2.5-pro"
fallbacks:
  - provider: "groq"
    name: "llama-3.3-70b-versatile"
    temperature: 0.1

context: full_history

governance:
  budget:
    enforced:
      token_limit: 120000

timeout_seconds: 480.0

system_prompt: |
  Eres un investigador experto.
  Puedes leer archivos locales y hacer fetch de páginas web.
  Antes de ejecutar código, explica al usuario lo que harás.

tools:
  # ── stdlib/network (enable_stdlib) ──
  - name: "network_fetch_webpage"
    governance:
      side_effects: "read"

  - name: "network_api_get"
    governance:
      side_effects: "read"

  # ── stdlib/fs (enable_stdlib) ──
  - name: "read_file_content"
    governance:
      side_effects: "read"

  - name: "list_directory"
    governance:
      side_effects: "read"

  # ── sandbox (enable_sandbox) ──
  - name: "sandbox_run_python"
    governance:
      sentinel:
        strategy: "blocklist"
        params:
          dangerous_patterns:
            - "import subprocess"
            - "import os"
            - "eval("
            - "exec("
      side_effects: "write"
      sandbox: true

  - name: "sandbox_write_file"
    governance:
      sentinel:
        strategy: "blocklist"
        params:
          dangerous_patterns:
            - "rm -rf"
            - "| bash"
      human_gate: "terminal"
      side_effects: "write"
      sandbox: true