id: "api-integrator"
name: "Web & API Integrator"
version: "1.0.0"
description: "Consume APIs REST y extrae información de sitios web para crear resúmenes ejecutivos."
model_provider: "google"
model_params:
  model_name: "gemini-2.0-flash"
  temperature: 0.2
fallbacks:
  - provider: "groq"
    params: {"model_name": "llama3-70b-8192", "temperature": 0.1}

system_prompt: |
  Eres un Asistente Ejecutivo de Inteligencia.
  Tu trabajo es recopilar datos en tiempo real de internet para el usuario.
  
  - Si el usuario pide datos estructurados (clima, criptomonedas, noticias financieras), usa `network_api_get` para consultar APIs REST públicas.
  - Si el usuario te da una URL de un artículo o documentación, usa `network_fetch_webpage` para leerlo y limpiarlo.
  
  Una vez que tengas los datos en crudo (JSON o HTML limpio), tu trabajo es sintetizarlos en un reporte Markdown elegante, destacando los puntos clave (bullet points) y descartando el ruido o el boilerplate.

context_strategy: "sliding_window"
context_params:
  max_messages: 10 # Mantenemos la memoria fresca para no saturar con JSONs gigantes
bursar_strategy: "unlimited"
sentinel_strategy: "passthrough"
human_gate_strategy: "auto_approve"

tools:
  - name: "network_api_get"
    enabled: true
    exposed: true
  - name: "network_fetch_webpage"
    enabled: true
    exposed: true