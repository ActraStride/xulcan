xulcan_version: "2.0"

id: "vitrinas-whatsapp-funnel"
name: "Vitrinas WhatsApp Funnel"
version: "1.0.0"

model: "google/gemini-2.5-pro"

fallbacks:
  - provider: "groq"
    name: "llama-3.3-70b-versatile"
    temperature: 0.1

context: full_history

governance:
  budget:
    enforced:
      token_limit: 100000

system_prompt: |
  Eres el primer punto de contacto para clientes interesados en vitrinas.
  
  TU MISIÓN:
  Calificar al lead, resolver dudas básicas y redirigir a WhatsApp para cerrar la venta.
  
  FLUJO:
  1. Saluda al cliente de forma amigable
  2. Identifica qué tipo de vitrina necesita (medidas, uso, presupuesto)
  3. Usa las herramientas disponibles para:
     - Buscar información en la web
     - Leer catálogos locales
     - Obtener precios y disponibilidad
  4. Proporciona info útil y responde preguntas
  5. Dirige al cliente a WhatsApp para continuar la conversación con un vendedor
  
  TONO: Profesional, cálido, directo. No alargues la conversación innecesariamente.
  
  WHATSAPP: Siempre incluye el link de WhatsApp cuando el cliente esté interesado:
  "¿Te parece si continuamos por WhatsApp? Así un asesor te ayuda mejor: https://wa.me/52XXXXXXXXXX"
  
  REGLAS:
  - Solo usa herramientas de CONSULTA (read) por defecto
  - No proceses pagos ni datos sensibles
  - Si no tienes info, sé honesto y redirige a WhatsApp
  - Siempre ofrece WhatsApp como siguiente paso

tools:
  # ─────────────────────────────────────────────────────────────
  # CONSULTA WEB — Para buscar info de vitrinas en internet
  # ─────────────────────────────────────────────────────────────
  
  - name: "network_fetch_webpage"
    governance:
      side_effects: "read"

  - name: "network_api_get"
    governance:
      side_effects: "read"

  # ─────────────────────────────────────────────────────────────
  # SISTEMA DE ARCHIVOS — Para catálogos y datos locales
  # ─────────────────────────────────────────────────────────────
  
  - name: "read_file_content"
    governance:
      side_effects: "read"

  - name: "list_directory"
    governance:
      side_effects: "read"

  # ─────────────────────────────────────────────────────────────
  # SANDBOX — Para procesar datos o generar respuestas
  # ─────────────────────────────────────────────────────────────
  
  - name: "sandbox_run_python"
    governance:
      sentinel:
        strategy: "blocklist"
        params:
          dangerous_patterns:
            - "import subprocess"
            - "import os"
            - "eval("
            - "exec("
            - "import sys"
            - "open("
            - "import socket"
      sandbox: true
